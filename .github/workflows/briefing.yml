name: Hermes AI 速报

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install playwright && playwright install chromium
      - run: python briefing.py

      - id: png
        run: |
          PNG=$(ls -t ~/briefings/*.png | head -1)
          echo "path=$PNG" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: briefing
          path: ~/briefings/*.png
          retention-days: 7

      - name: Send to WeChat
        if: steps.png.outputs.path != ''
        env:
          WEBHOOK: ${{ secrets.WECHAT_WEBHOOK_URL }}
          TITLE: "Hermes AI 速报 $(date '+%Y-%m-%d %H:%M')"
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ART_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts"
        run: python send.py
