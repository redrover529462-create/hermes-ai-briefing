name: Hermes AI 速报

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          pip install playwright
          playwright install chromium

      - name: Generate
        run: python briefing.py

      - name: Find PNG
        id: png
        run: |
          PNG=$(ls -t ~/briefings/*.png 2>/dev/null | head -1)
          echo "path=$PNG" >> $GITHUB_OUTPUT
          echo "Found: $PNG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: briefing
          path: ~/briefings/*.png
          retention-days: 7

      - name: Send to WeChat
        if: steps.png.outputs.path != ''
        env:
          WEBHOOK: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: |
          PNG="${{ steps.png.outputs.path }}"
          TITLE="Hermes AI 速报 $(date '+%Y-%m-%d %H:%M')"

          if [ -z "$WEBHOOK" ]; then
            echo "No webhook configured. Skipping WeChat send."
            exit 0
          fi

          # 上传图片到 Server酱
          echo "Uploading image..."
          UP=$(curl -s -X POST "https://sctapi.ftqq.com/upload" -F "file=@$PNG")
          IMG=$(echo "$UP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('url',''))" 2>/dev/null)

          if [ -n "$IMG" ]; then
            echo "Image URL: $IMG"
            MSG="![Hermes AI 速报]($IMG)"
          else
            echo "Image upload failed. Sending text only."
            MSG="本期速报已生成，请查看 GitHub Actions Artifacts"
          fi

          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"$TITLE\",\"desp\":\"$MSG\"}"
          
          echo "" && echo "Done!"
