name: Hermes AI 速报

on:
  schedule:
    - cron: '0 */4 * * *'   # 每 4 小时运行一次
  workflow_dispatch:          # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          sudo apt-get install -y fonts-noto-color-emoji 2>/dev/null || true

      - name: Generate briefing
        run: python briefing.py

      - name: Upload PNG artifact
        uses: actions/upload-artifact@v4
        with:
          name: briefing
          path: ~/briefings/*.png
          retention-days: 7

      - name: Send to WeChat (via webhook)
        if: env.BRIEFING_PNG != ''
        env:
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: |
          if [ -n "$WECHAT_WEBHOOK" ]; then
            BRIEFING_DATE="${{ env.BRIEFING_DATE }}"
            IMG_PATH="${{ env.BRIEFING_PNG }}"
            echo "Would send: $IMG_PATH (date: $BRIEFING_DATE)"
            echo "Webhook configured: YES"
            # TODO: upload image and send via webhook
          else
            echo "No WECHAT_WEBHOOK_URL configured. Set it in GitHub repo Secrets."
            echo "Format: your Server酱/PushPlus/企业微信 webhook URL"
          fi
